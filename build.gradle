plugins {
    id 'java'
}

group = 'org.example'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    // Source: https://mvnrepository.com/artifact/org.testng/testng
    testImplementation("org.testng:testng:7.12.0")
    // Source: https://mvnrepository.com/artifact/io.rest-assured/rest-assured
    testImplementation("io.rest-assured:rest-assured:6.0.0")
    testImplementation 'io.rest-assured:xml-path:6.0.0'
    testImplementation 'io.rest-assured:json-schema-validator:6.0.0'
// Source: https://mvnrepository.com/artifact/com.github.scribejava/scribejava-apis
    runtimeOnly("com.github.scribejava:scribejava-apis:8.3.3")
    // Source: https://mvnrepository.com/artifact/com.google.code.gson/gson
    implementation("com.google.code.gson:gson:2.14.0")
// Source: https://mvnrepository.com/artifact/io.rest-assured/json-path
    implementation("io.rest-assured:json-path:6.0.0")
    // Source: https://mvnrepository.com/artifact/org.json/json
    implementation("org.json:json:20260522")
// Source: https://mvnrepository.com/artifact/com.github.javafaker/javafaker
    implementation("com.github.javafaker:javafaker:1.0.2")
}

test {
    useTestNG()
}